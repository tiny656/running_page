<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      const basePath = import.meta.env.BASE_URL;
      const path = window.location.pathname;
      sessionStorage.setItem('redirect', path);
      window.location.replace(window.location.origin + basePath + '/');
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
